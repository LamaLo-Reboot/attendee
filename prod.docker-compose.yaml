services:
  postgres:
    image: postgres:15.3-alpine
    environment:
      POSTGRES_DB: attendee_prod
      POSTGRES_USER: attendee_prod
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /data/postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/data/postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U attendee_prod"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data/redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  caddy:
    image: caddy:2-alpine
    network_mode: host
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      attendee-app-prod:
        condition: service_started
    restart: always

  attendee-app-prod:
    build: ./
    network_mode: host
    env_file: .env.production
    entrypoint: []
    command: >
      bash -c "python manage.py collectstatic --noinput &&
               gunicorn attendee.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 120"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always

  attendee-worker-prod:
    build: ./
    network_mode: host
    env_file: .env.production
    command: "celery -A attendee worker -l INFO -Q celery,bot_launcher_vm"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always

  attendee-scheduler-prod:
    build: ./
    network_mode: host
    env_file: .env.production
    entrypoint: []
    command: "python manage.py run_scheduler"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:
